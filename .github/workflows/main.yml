name: Bot-K2 Final Stable

on:
  schedule:
    - cron: "0 */6 * * *"        # اجرای خودکار هر ۶ ساعت
  workflow_dispatch:            # اجرای دستی

permissions:                   # ★ این دو خط فوق‌العاده مهم است
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: نصب ابزارهای صوتی و تصویری
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg pulseaudio

      - name: نصب کتابخونه‌های پایتون
        run: |
          pip install aiohttp beautifulsoup4 playwright

      - name: نصب مرورگر کروم برای Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: اجرای ربات (۵:۵۵ ساعت)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          timeout 21300 python Bot.py
